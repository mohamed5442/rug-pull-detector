<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2255;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030308;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0815;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="safe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ddff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Scan lines -->
  <g opacity="0.02">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="4" x2="1200" y2="4" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="8" x2="1200" y2="8" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="12" x2="1200" y2="12" stroke="#00ff88" stroke-width="1"/>
  </g>

  <!-- Glow -->
