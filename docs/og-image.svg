    <text x="56" y="24" font-family="system-ui" font-size="14" fill="#e4e4ef" font-weight="700">PumpFrog</text>
    <text x="140" y="24" font-family="monospace" font-size="11" fill="#555577">$PFROG</text>
    <text x="56" y="40" font-family="monospace" font-size="9" fill="#555577">3mNk...wR4t</text>
    <text x="400" y="30" font-family="monospace" font-size="28" fill="#ff2255" font-weight="900" text-anchor="end">87</text>
    <rect x="415" y="16" width="80" height="22" rx="5" fill="rgba(255,34,85,0.15)" stroke="rgba(255,34,85,0.3)" stroke-width="1"/>
