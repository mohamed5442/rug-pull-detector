    <text x="370" y="66" font-family="monospace" font-size="13" fill="#00ff88" text-anchor="end" font-weight="700">REVOKED</text>

    <text x="24" y="92" font-family="system-ui" font-size="13" fill="#e4e4ef">Liquidity Lock</text>
    <text x="370" y="92" font-family="monospace" font-size="13" fill="#ff2255" text-anchor="end" font-weight="700">UNLOCKED</text>

    <text x="24" y="118" font-family="system-ui" font-size="13" fill="#e4e4ef">Top Holder</text>
    <text x="370" y="118" font-family="monospace" font-size="13" fill="#ff8800" text-anchor="end" font-weight="700">67.3%</text>

    <text x="24" y="144" font-family="system-ui" font-size="13" fill="#e4e4ef">LP Burned</text>
    <text x="370" y="144" font-family="monospace" font-size="13" fill="#00ff88" text-anchor="end" font-weight="700">YES</text>
  </g>

