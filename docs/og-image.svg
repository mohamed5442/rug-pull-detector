  <ellipse cx="800" cy="350" rx="400" ry="300" fill="#ff8800" opacity="0.03"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#grad)"/>

  <!-- Warning icon -->
  <g transform="translate(100, 100)">
    <circle cx="25" cy="25" r="25" fill="rgba(255,34,85,0.15)" stroke="rgba(255,34,85,0.4)" stroke-width="2"/>
    <text x="25" y="35" font-family="system-ui" font-size="30" fill="#ff2255" text-anchor="middle" font-weight="900">!</text>
  </g>

  <text x="165" y="128" font-family="monospace" font-size="14" fill="#ff2255" font-weight="700">SCANNING</text>

  <!-- Title -->
  <text x="100" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="#e4e4ef" letter-spacing="-2">
