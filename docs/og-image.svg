    <rect x="0" y="0" width="4" height="52" rx="2" fill="#ff2255"/>
    <circle cx="30" cy="26" r="14" fill="rgba(255,34,85,0.1)" stroke="rgba(255,34,85,0.3)" stroke-width="1"/>
