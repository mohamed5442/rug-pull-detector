    <rect x="0" y="0" width="500" height="52" rx="10" fill="#08081a" stroke="#ff880033" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="52" rx="2" fill="#ff8800"/>
    <circle cx="30" cy="26" r="14" fill="rgba(255,136,0,0.1)" stroke="rgba(255,136,0,0.3)" stroke-width="1"/>
    <text x="30" y="31" font-family="monospace" font-size="12" fill="#ffcc00" text-anchor="middle" font-weight="800">N</text>
    <text x="56" y="24" font-family="system-ui" font-size="14" fill="#e4e4ef" font-weight="700">NexusSwap</text>
    <text x="148" y="24" font-family="monospace" font-size="11" fill="#555577">$NXSW</text>
    <text x="56" y="40" font-family="monospace" font-size="9" fill="#555577">9pLq...kT2f</text>
    <text x="400" y="30" font-family="monospace" font-size="28" fill="#ff8800" font-weight="900" text-anchor="end">45</text>
    <rect x="415" y="16" width="72" height="22" rx="5" fill="rgba(255,136,0,0.1)" stroke="rgba(255,136,0,0.2)" stroke-width="1"/>
    <text x="451" y="31" font-family="monospace" font-size="10" fill="#ff8800" text-anchor="middle" font-weight="700">CAUTION</text>
