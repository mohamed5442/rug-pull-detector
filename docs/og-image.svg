  </text>

  <!-- Simulated token scan results -->
  <g transform="translate(100, 310)">
    <!-- Token 1 — SAFE -->
    <rect x="0" y="0" width="500" height="52" rx="10" fill="#08081a" stroke="#00ff8833" stroke-width="1"/>
    <rect x="0" y="0" width="4" height="52" rx="2" fill="#00ff88"/>
    <circle cx="30" cy="26" r="14" fill="rgba(0,255,136,0.1)" stroke="rgba(0,255,136,0.3)" stroke-width="1"/>
    <text x="30" y="31" font-family="monospace" font-size="12" fill="#00ff88" text-anchor="middle" font-weight="800">A</text>
    <text x="56" y="24" font-family="system-ui" font-size="14" fill="#e4e4ef" font-weight="700">AetherAI</text>
    <text x="135" y="24" font-family="monospace" font-size="11" fill="#555577">$AETH</text>
    <text x="56" y="40" font-family="monospace" font-size="9" fill="#555577">7kXz...9mPq</text>
    <text x="400" y="30" font-family="monospace" font-size="28" fill="#00ff88" font-weight="900" text-anchor="end">12</text>
    <rect x="415" y="16" width="60" height="22" rx="5" fill="rgba(0,255,136,0.1)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
    <text x="445" y="31" font-family="monospace" font-size="10" fill="#00ff88" text-anchor="middle" font-weight="700">SAFE</text>
